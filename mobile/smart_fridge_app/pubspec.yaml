name: smart_fridge_app
description: Zero Waste Smart Fridge - IoT food monitoring mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  # 3.6.0+ (Flutter 3.27+) is required for Color.withValues and CardThemeData.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase Realtime Database
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4

  # QR code scanning (live camera, used by the backup manual scan)
  mobile_scanner: ^5.2.3

  # Camera QR scan + banana analysis: fetch the ESP32-CAM image, decode
  # its QR code, and run pixel-based browning analysis.
  http: ^1.2.2          # fetch the /capture image
  image: ^4.3.0         # decode JPEG/PNG into pixels
  zxing2: ^0.2.3        # pure-Dart QR decoding (works on mobile and web)

  # Persist the user-configured ESP32-CAM address.
  shared_preferences: ^2.3.2

  # Date / time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo/
