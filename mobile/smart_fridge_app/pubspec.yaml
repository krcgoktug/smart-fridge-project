name: smart_fridge_app
description: Zero Waste Smart Fridge - IoT monitoring app.
publish_to: "none"
version: 1.0.0+1

environment:
  # 3.6.0+ (Flutter 3.27+) is required for Color.withValues and CardThemeData.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase Realtime Database.
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4

  # Live ESP32-CAM MJPEG stream.
  flutter_mjpeg: ^2.0.0

  # Capture a frame from the ESP32-CAM and decode its QR code.
  # http is pinned to 0.13.x for compatibility with flutter_mjpeg.
  http: ^0.13.6         # fetch /capture
  image: ^4.3.0         # decode the JPEG into pixels
  zxing2: ^0.2.3        # pure-Dart QR decoding

  # Persist the camera IP locally.
  shared_preferences: ^2.3.2

  # Date / time formatting.
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
