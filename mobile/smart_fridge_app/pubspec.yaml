name: smart_fridge_app
description: Zero Waste Smart Fridge - IoT food monitoring mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  # 3.6.0+ (Flutter 3.27+) is required for Color.withValues and CardThemeData.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase Realtime Database
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4

  # QR code scanning
  mobile_scanner: ^5.2.3

  # Date / time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
