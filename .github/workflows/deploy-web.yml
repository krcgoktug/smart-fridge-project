name: Deploy web app to GitHub Pages

# Builds the Flutter mobile app for the web and publishes it to GitHub Pages
# on every push to main. The deployed app runs in "demo mode" (built-in
# sample data) so anyone can open it from a phone or laptop browser without
# any Firebase setup.

on:
  push:
    branches: [main]
    paths:
      - "mobile/smart_fridge_app/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build web
        working-directory: mobile/smart_fridge_app
        run: |
          flutter pub get
          flutter build web --release --base-href /smart-fridge-project/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/smart_fridge_app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
